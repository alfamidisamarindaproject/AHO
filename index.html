<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AHO Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-dept { background: #eef2ff; border-left: 5px solid #4f46e5; }
        .critical-row { background-color: #fff1f2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-lg">
        <div class="p-6 bg-indigo-900 text-white">
            <h1 class="text-xl font-bold italic">AHO LEADERBOARD</h1>
            <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest">Master Department List</p>
        </div>
        <div id="dept-list" class="flex-1 overflow-y-auto p-2">
            <div id="side-loader" class="p-10 text-center text-slate-400">
                <i class="fas fa-sync fa-spin fa-2xl mb-4 text-indigo-500"></i>
                <p class="text-xs font-bold uppercase">Syncing Dept...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center">
            <i class="fas fa-layer-group fa-5x text-slate-200 mb-4"></i>
            <h2 class="text-slate-400 font-bold uppercase italic">Pilih Departemen</h2>
        </div>

        <div id="detail-view" class="hidden flex-1 overflow-y-auto p-8">
            <div class="mb-8 flex justify-between items-center">
                <h2 id="view-dept-name" class="text-4xl font-black text-slate-800 uppercase italic">DEPARTEMEN</h2>
                <div id="score-card" class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg text-center min-w-[120px]">
                    <p class="text-[10px] font-bold uppercase opacity-80">AHO Score</p>
                    <p id="final-score-val" class="text-3xl font-black italic">0.00</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-6 uppercase italic tracking-wider">
                        <i class="fas fa-chart-bar text-indigo-500 mr-2"></i> Top Problem Categories
                    </h3>
                    <div id="problem-bars" class="space-y-4"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-rose-600 mb-6 uppercase italic tracking-wider">
                        <i class="fas fa-exclamation-triangle mr-2"></i> SLA Critical & Outstanding
                    </h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-50 text-slate-400 font-bold uppercase italic">
                                <tr>
                                    <th class="p-3">Ticket</th>
                                    <th class="p-3">Status</th>
                                    <th class="p-3 text-right">Target</th>
                                    <th class="p-3 text-right">Umur</th>
                                </tr>
                            </thead>
                            <tbody id="unclosed-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
