<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 h-screen flex font-sans">
  
  <aside class="w-80 bg-white border-r flex flex-col shadow-lg z-20">
    <div class="p-6 bg-indigo-900 text-white">
      <h1 class="text-xl font-bold tracking-tighter italic">AHO MONITORING</h1>
    </div>
    <nav id="dept-list" class="flex-1 overflow-y-auto p-4 space-y-2"></nav>
  </aside>

  <main class="flex-1 overflow-y-auto p-8">
    <div id="dashboard-content" class="max-w-5xl mx-auto space-y-6">
      <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border">
           <h3 class="font-bold mb-4">Top Masalah</h3>
           <div id="problem-chart"></div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border">
           <h3 class="font-bold mb-4 text-red-600">SLA Kritis</h3>
           <table class="w-full text-xs" id="sla-table"></table>
        </div>
      </div>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
