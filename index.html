<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AHO Monitoring - Master Dept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-dept { background: #f1f5f9; border-left: 5px solid #4f46e5; transform: translateX(5px); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-lg z-20">
        <div class="p-6 bg-indigo-900 text-white">
            <h1 class="text-xl font-black italic tracking-tighter italic">AHO LEADERBOARD</h1>
            <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest">Master Department List</p>
        </div>
        <div id="dept-list" class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1">
            <div class="p-10 text-center text-slate-400 animate-pulse">
                <i class="fas fa-database fa-2xl mb-4"></i>
                <p class="text-xs">Synchronizing Dept...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center">
            <div class="bg-slate-200/50 p-10 rounded-full mb-6">
                <i class="fas fa-layer-group fa-4xl text-slate-300"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-400 italic uppercase">Pilih Departemen untuk Analisis</h2>
        </div>

        <div id="detail-view" class="hidden flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div>
                    <span id="rank-label" class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full uppercase italic tracking-widest">Rank #0</span>
                    <h2 id="view-dept-name" class="text-3xl font-black text-slate-800 uppercase italic mt-2">DEPARTEMEN</h2>
                </div>
                <div id="summary-score" class="flex gap-4"></div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-6 italic uppercase tracking-wider flex items-center">
                        <i class="fas fa-fire-alt text-orange-500 mr-2"></i> Top Problem Categories
                    </h3>
                    <div id="problem-bars" class="space-y-4"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-rose-600 mb-6 italic uppercase tracking-wider flex items-center">
                        <i class="fas fa-exclamation-triangle mr-2"></i> SLA Minus & Outstanding
                    </h3>
                    <div class="overflow-hidden rounded-xl">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-50 text-slate-400 font-bold uppercase italic">
                                <tr>
                                    <th class="p-4">Ticket</th>
                                    <th class="p-4">Status</th>
                                    <th class="p-4 text-right">Target</th>
                                    <th class="p-4 text-right">Umur</th>
                                </tr>
                            </thead>
                            <tbody id="unclosed-tbody" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
