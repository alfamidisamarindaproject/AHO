<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHO Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dept-item.active { background: #f1f5f9; border-left: 4px solid #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-xl z-20">
        <div class="p-6 bg-slate-900 text-white">
            <h1 class="text-xl font-bold tracking-tight">AHO LEADERBOARD</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Ranked by Service Score</p>
        </div>
        <div id="dept-list" class="flex-1 overflow-y-auto custom-scroll">
            <div class="p-10 text-center text-slate-400">
                <i class="fas fa-spinner fa-spin fa-2xl mb-4"></i>
                <p>Loading Data...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
            <i class="fas fa-chart-line fa-5x text-slate-200 mb-6"></i>
            <h2 class="text-2xl font-bold text-slate-800">Pilih Departemen</h2>
            <p class="text-slate-500 max-w-sm">Klik salah satu departemen di sebelah kiri untuk melihat detail problem dan SLA kritis.</p>
        </div>

        <div id="detail-content" class="hidden flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-6">
                <div>
                    <h2 id="current-dept-name" class="text-4xl font-extrabold text-slate-900 uppercase italic">DEPARTEMEN</h2>
                    <p class="text-slate-500 font-medium">Monitoring Problem & SLA Minus</p>
                </div>
                <div id="summary-badges" class="flex gap-3"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold mb-6 flex items-center">
                        <i class="fas fa-list-ol text-indigo-500 mr-2"></i> Problem Terbanyak
                    </h3>
                    <div id="top-problem-bars" class="space-y-4"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold mb-6 text-rose-600 flex items-center">
                        <i class="fas fa-exclamation-triangle mr-2"></i> SLA Critical & Outstanding
                    </h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-50 text-slate-400 uppercase">
                                <tr>
                                    <th class="p-3">Problem</th>
                                    <th class="p-3">Status</th>
                                    <th class="p-3 text-right">Target</th>
                                    <th class="p-3 text-right">Umur</th>
                                </tr>
                            </thead>
                            <tbody id="problem-table-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
