<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-gray-800 italic">DASHBOARD MONITORING AHO</h1>
    
    <div class="mb-6">
      <select id="deptSelect" class="p-3 rounded-lg border w-full shadow-sm" onchange="filterData()">
        <option value="">Pilih Departemen (Auto-Generated)</option>
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
        <p class="text-sm text-gray-500">Total Masalah</p>
        <h2 id="totalCase" class="text-2xl font-bold">0</h2>
      </div>
      </div>

    <table class="w-full bg-white rounded-xl shadow-lg overflow-hidden">
      <thead class="bg-gray-800 text-white">
        <tr>
          <th class="p-4 text-left">No Problem</th>
          <th class="p-4 text-left">Departemen</th>
          <th class="p-4 text-left">Masalah</th>
          <th class="p-4 text-left">Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    let allData = [];

    // Ambil data saat halaman dimuat
    google.script.run.withSuccessHandler(data => {
      allData = data;
      populateFilter();
      renderTable(data);
    }).getDashboardData();

    function populateFilter() {
      const depts = [...new Set(allData.map(d => d.Departemen))];
      const select = document.getElementById('deptSelect');
      depts.forEach(d => {
        if(d) select.innerHTML += `<option value="${d}">${d}</option>`;
      });
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map(d => `
        <tr class="border-b hover:bg-gray-50">
          <td class="p-4">${d['No Problem']}</td>
          <td class="p-4">${d.Departemen}</td>
          <td class="p-4">${d.Masalah}</td>
          <td class="p-4"><span class="px-2 py-1 rounded-full bg-green-100 text-green-700 text-xs">${d.Status}</span></td>
        </tr>
      `).join('');
      document.getElementById('totalCase').innerText = data.length;
    }

    function filterData() {
      const dept = document.getElementById('deptSelect').value;
      const filtered = dept ? allData.filter(d => d.Departemen === dept) : allData;
      renderTable(filtered);
    }
  </script>
</body>
</html>
