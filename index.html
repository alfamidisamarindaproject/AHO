<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div id="status" class="text-blue-600 font-bold mb-4">Memuat data...</div>
  <div id="dept-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
  <table class="w-full bg-white shadow rounded-lg overflow-hidden">
    <thead><tr class="bg-gray-800 text-white"><th class="p-3">No</th><th class="p-3">Status</th></tr></thead>
    <tbody id="table-body"></tbody>
  </table>

  <script>
    // Memanggil fungsi dari Code.gs secara langsung
    function loadData() {
      document.getElementById('status').innerText = "Menghubungkan ke Google Sheets...";
      
      google.script.run
        .withSuccessHandler(data => {
          document.getElementById('status').innerText = "Data berhasil dimuat!";
          renderDashboard(data);
        })
        .withFailureHandler(err => {
          document.getElementById('status').innerText = "Error: " + err;
        })
        .getDataFromSheet();
    }

    function renderDashboard(data) {
      // Logic render data Anda di sini...
    }

    window.onload = loadData;
  </script>
</body>
</html>
