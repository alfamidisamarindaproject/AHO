<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .active-nav { background: #eef2ff; border-right: 4px solid #4f46e5; }
    .critical { background-color: #fef2f2 !important; border: 1px solid #fecaca; }
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden font-sans">

  <aside class="w-80 bg-white border-r border-gray-200 flex flex-col shadow-xl">
    <div class="p-6 bg-indigo-900 text-white">
      <h1 class="text-xl font-bold italic tracking-tight">AHO LEADERBOARD</h1>
      <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest">Dashboard Monitoring</p>
    </div>
    <div id="dept-list" class="flex-1 overflow-y-auto p-2 space-y-1">
      <div class="p-4 text-center text-gray-400 italic">Memuat Departemen...</div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <div id="detail-view" class="p-8 hidden">
      <h2 id="dept-name" class="text-3xl font-black text-gray-800 uppercase mb-6 italic">Pilih Departemen</h2>
      
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-700 mb-4">Masalah Terbanyak</h3>
          <div id="problem-bars" class="space-y-3"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <h3 class="font-bold text-red-600 mb-4">SLA Critical & Outstanding</h3>
          <table class="w-full text-xs text-left">
            <thead class="text-gray-400 uppercase"><tr><th class="p-2">No</th><th class="p-2">Status</th><th class="p-2">Target</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
