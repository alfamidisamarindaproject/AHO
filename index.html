<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AHO Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 p-4 lg:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-indigo-900 uppercase tracking-tighter">AHO Performance Dashboard</h1>
                <p class="text-slate-500">Monitoring Score Layanan Berdasarkan Departemen</p>
            </div>
            <div id="loader" class="text-indigo-600 font-bold flex items-center">
                <i class="fas fa-circle-notch fa-spin mr-2"></i> Syncing Data...
            </div>
        </header>

        <h2 class="text-xl font-bold mb-4 text-slate-700 flex items-center">
            <i class="fas fa-trophy text-yellow-500 mr-2"></i> Ranking 13 Departemen (Highest SLA)
        </h2>
        <div id="dept-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50">
                <h3 class="font-bold">Recent Service Records</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="main-table">
                    <thead class="text-xs text-slate-400 uppercase bg-slate-50">
                        <tr>
                            <th class="px-6 py-4">Departemen</th>
                            <th class="px-6 py-4">Toko</th>
                            <th class="px-6 py-4">Problem</th>
                            <th class="px-6 py-4 text-center">ACH SLA</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
