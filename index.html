<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">
  <aside class="w-80 bg-white border-r p-4 overflow-y-auto" id="sidebar">
    <h2 class="font-bold text-lg mb-4">Departemen</h2>
    <div id="dept-list" class="space-y-2">Memuat...</div>
  </aside>
  <main class="flex-1 p-8 overflow-y-auto">
    <div id="dashboard-content" class="hidden">
      <h1 id="dept-title" class="text-2xl font-black italic mb-6"></h1>
      <div id="stats" class="grid grid-cols-3 gap-4 mb-6"></div>
      <table class="w-full bg-white rounded shadow text-sm" id="data-table">
        <thead class="bg-gray-800 text-white"><tr><th class="p-2">No</th><th class="p-2">Status</th><th class="p-2">Target</th></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
