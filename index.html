<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>AHO Performance Dashboard</title>
</head>
<body class="bg-gray-50 flex h-screen">
  <aside class="w-72 bg-white border-r p-4 overflow-y-auto">
    <h2 class="font-bold text-lg mb-4 text-indigo-900 uppercase italic">13 Departemen</h2>
    <div id="dept-list" class="space-y-1"></div>
  </aside>
  <main class="flex-1 p-8 overflow-y-auto">
    <div id="content" class="hidden space-y-6">
      <h1 id="dept-name" class="text-3xl font-black uppercase italic"></h1>
      <div id="score-cards" class="grid grid-cols-4 gap-4"></div>
      <div class="grid grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-xl shadow border">
          <h3 class="font-bold mb-4">Problem Terbanyak</h3>
          <div id="top-probs"></div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow border">
          <h3 class="font-bold mb-4 text-red-600">SLA Kritis & Mendekati</h3>
          <table class="w-full text-xs" id="sla-table"></table>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
